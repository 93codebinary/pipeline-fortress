name: "PipelineFortress — SAST + Secrets + SCA + Build + Image Scan + IaC + SBOM + DAST + Push + Deploy"

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-juiceshop-devsecops

# ════════════════════════════════════════════════════════════
# CONCURRENCY — serialises runs on the same branch so two
# deployments never fight over the container name or port 80
# on the self-hosted runner.
#
# cancel-in-progress: false is deliberate — never cancel a run
# that may have already pushed an image but not yet completed
# its deployment.
# ════════════════════════════════════════════════════════════
concurrency:
  group: pipelinefortress-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 — SECRETS SCAN (Gitleaks)
  # ════════════════════════════════════════════════════════════
  secrets_scan:
    name: "🔑 Secrets Scan — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure SARIF exists (even if no secrets found)
        if: always()
        run: |
          if [ ! -f results.sarif ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks"}},"results":[]}]}' \
              > results.sarif
          fi

      - name: Upload Gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 2 — SAST (Semgrep)
  # ════════════════════════════════════════════════════════════
  sast_scan:
    name: "🔍 SAST — Semgrep"
    runs-on: ubuntu-latest
    needs: secrets_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --break-system-packages

      - name: Run Semgrep SAST scan
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/owasp-top-ten" \
            --config "p/jwt" \
            --config "p/xss" \
            --config "p/sql-injection" \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING \
            . \
            || true

      - name: Ensure SARIF exists and is valid
        run: |
          if [ ! -f semgrep-results.sarif ] || [ ! -s semgrep-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep"}},"results":[]}]}' \
              > semgrep-results.sarif
          fi

      - name: Enforce SAST gate — fail on ERROR findings
        run: |
          ERROR_COUNT=$(python3 -c "
          import json, sys
          try:
              with open('semgrep-results.sarif') as f:
                  data = json.load(f)
              errors = [
                  r for r in data.get('runs',[{}])[0].get('results',[])
                  if r.get('level') == 'error'
              ]
              print(len(errors))
          except Exception as e:
              sys.stderr.write(f'Warning: {e}\n')
              print(0)
          ")
          echo "Semgrep ERROR findings: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "SAST gate FAILED — $ERROR_COUNT ERROR-level findings."
            exit 1
          fi
          echo "SAST gate passed."

      - name: Upload Semgrep SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-results.sarif
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 3 — SCA (Trivy Filesystem)
  # ════════════════════════════════════════════════════════════
  sca_scan:
    name: "📦 SCA — Trivy Dependency Scan"
    runs-on: ubuntu-latest
    needs: secrets_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── TRIVY EXCLUSIONS ──────────────────────────────────────
      # ignore-unfixed : suppress CVEs with no available fix
      # trivyignores   : .trivyignore file in repo root holds
      #                  consciously accepted CVEs with comments
      #                  and review dates (documented risk acceptance)
      # ──────────────────────────────────────────────────────────
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '0'
          format: json
          output: trivy-fs-results.json

      - name: Ensure Trivy FS output exists
        run: |
          if [ ! -f trivy-fs-results.json ] || [ ! -s trivy-fs-results.json ]; then
            echo '{"Results":[]}' > trivy-fs-results.json
          fi

      # ── SCA QUALITY GATE: AUDIT MODE (enforcement commented out) ─
      # The scan still runs and the CRITICAL count is still printed
      # as a GitHub warning annotation, but the pipeline NO LONGER
      # fails on it. Uncomment the "exit 1" line to re-enable
      # enforcement (Count → Block, same as WAF rule promotion).
      # ─────────────────────────────────────────────────────────────
      - name: SCA severity gate (AUDIT MODE — not enforcing)
        run: |
          CRITICAL_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-fs-results.json') as f:
                  data = json.load(f)
              count = sum(
                  1 for result in data.get('Results', [])
                  for v in result.get('Vulnerabilities', [])
                  if v.get('Severity') == 'CRITICAL'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL CVEs in dependencies: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "5" ]; then
            echo "::warning::SCA gate would have FAILED — $CRITICAL_COUNT CRITICAL CVEs exceed threshold of 5 (gate in audit mode)"
            # exit 1   # ← uncomment to re-enable enforcement
          fi
          echo "SCA gate: audit mode — pipeline continues regardless. CRITICAL count: $CRITICAL_COUNT"

      - name: Print SCA summary
        if: always()
        run: |
          python3 -c "
          import json
          try:
              with open('trivy-fs-results.json') as f:
                  data = json.load(f)
              print('=== DEPENDENCY VULNERABILITY SUMMARY ===')
              for result in data.get('Results', []):
                  vulns = result.get('Vulnerabilities', [])
                  if vulns:
                      print(f\"Target: {result.get('Target','unknown')}\")
                      for sev in ['CRITICAL','HIGH','MEDIUM','LOW']:
                          c = sum(1 for v in vulns if v.get('Severity') == sev)
                          if c:
                              print(f'  {sev}: {c}')
          except Exception:
              print('Could not parse results')
          "

      - name: Upload Trivy FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 4 — BUILD DOCKER IMAGE (LOCAL ONLY — NO PUSH)
  #
  # Build and push are SEPARATE jobs. This job only builds the
  # image and saves it as a tar artifact. The tar is what
  # image_scan / sbom / dast consume. Docker Hub push happens
  # ONLY in Job 9 (push_image), AFTER the DAST gate passes.
  # ════════════════════════════════════════════════════════════
  build:
    name: "🐳 Build Docker Image (no push)"
    runs-on: ubuntu-latest
    needs: [sast_scan, sca_scan]

    outputs:
      version: ${{ steps.calc_version.outputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── VERSIONING ────────────────────────────────────────────
      # CHANGED because the GitOps job that used to write version.txt
      # back to the repo has been removed.
      #
      # Reading version.txt now would produce the SAME version on
      # every run — each build would overwrite the previous Docker
      # Hub tag and you would lose version history entirely.
      #
      # github.run_number is monotonic, unique per run, and requires
      # no shared mutable state. It also removes the race condition
      # that previously made two concurrent runs collide.
      #
      # To go back to the file-based counter, restore the GitOps job
      # and swap this step for the commented block below.
      # ──────────────────────────────────────────────────────────
      - name: Calculate version
        id: calc_version
        run: |
          VERSION="${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build version : $VERSION  (github.run_number)"
          echo "Commit        : ${{ github.sha }}"

          # Previous file-based scheme, kept for reference:
          #   RAW=$(cat version.txt)
          #   INT=$(echo "$RAW" | cut -d'.' -f1)
          #   VERSION=$(( INT + 1 ))

      - name: Build Docker Image (local only)
        run: |
          docker build -t docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }} .

      - name: Save Docker Image as tar
        run: |
          docker save -o juiceshop-image.tar \
            docker.io/${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}

      - name: Upload Docker Image tar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-tar
          path: juiceshop-image.tar
          retention-days: 1


  # ════════════════════════════════════════════════════════════
  # JOB 5 — CONTAINER IMAGE SCAN (Trivy image)
  # ════════════════════════════════════════════════════════════
  image_scan:
    name: "🛡️ Image Scan — Trivy"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      # ── TRIVY EXCLUSIONS ──────────────────────────────────────
      # ignore-unfixed : base-image CVEs with no fix available are
      #                  suppressed (Juice Shop's old Node base has
      #                  many CRITICALs with no patched version)
      # trivyignores   : .trivyignore for consciously accepted CVEs
      # NOTE: checkout runs BEFORE this step so .trivyignore exists
      # in the working directory even in tarball mode.
      # ──────────────────────────────────────────────────────────
      - name: Run Trivy image scan in tarball mode
        uses: aquasecurity/trivy-action@master
        with:
          input: juiceshop-image.tar
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '0'
          format: json
          output: trivy-image-results.json

      - name: Ensure Trivy image output exists
        run: |
          if [ ! -f trivy-image-results.json ] || [ ! -s trivy-image-results.json ]; then
            echo '{"Results":[]}' > trivy-image-results.json
          fi

      # ── IMAGE QUALITY GATE: AUDIT MODE (enforcement commented out) ─
      # FIX retained: the "except Exception" block that caused the
      # earlier SyntaxError is still present.
      # The CRITICAL OS CVE count is printed as a warning annotation,
      # but the pipeline NO LONGER fails on it. Uncomment "exit 1"
      # to re-enable enforcement.
      # ───────────────────────────────────────────────────────────────
      - name: Image scan gate (AUDIT MODE — not enforcing)
        run: |
          CRITICAL_COUNT=$(python3 -c "
          import json
          try:
              with open('trivy-image-results.json') as f:
                  data = json.load(f)
              os_types = {'alpine','debian','ubuntu','centos','rhel','node'}
              count = sum(
                  1 for result in data.get('Results', [])
                  if result.get('Type','').lower() in os_types
                  for v in result.get('Vulnerabilities', [])
                  if v.get('Severity') == 'CRITICAL'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL OS/runtime CVEs in image: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "::warning::Image gate would have FAILED — $CRITICAL_COUNT CRITICAL OS CVEs (gate in audit mode)"
            # exit 1   # ← uncomment to re-enable enforcement
          fi
          echo "Image scan gate: audit mode — pipeline continues regardless."

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 6 — IaC SCAN (Checkov)
  # ════════════════════════════════════════════════════════════
  iac_scan:
    name: "🏗️ IaC Scan — Checkov"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov --break-system-packages

      - name: Run Checkov IaC scan on k8s manifests
        run: |
          checkov -d k8s/ \
            --framework kubernetes \
            --output json \
            --output-file checkov-results.json \
            --soft-fail-on MEDIUM,LOW \
            || true

      - name: Ensure Checkov output exists
        run: |
          if [ ! -f checkov-results.json ] || [ ! -s checkov-results.json ]; then
            echo '{"results":{"passed_checks":[],"failed_checks":[]}}' \
              > checkov-results.json
          fi

      - name: Enforce IaC gate — fail on CRITICAL or HIGH
        run: |
          FAILED_COUNT=$(python3 -c "
          import json
          try:
              with open('checkov-results.json') as f:
                  data = json.load(f)
              results = data if isinstance(data, list) else [data]
              count = 0
              for r in results:
                  for check in r.get('results', {}).get('failed_checks', []):
                      sev = check.get('check_result', {}).get('severity', '')
                      if sev in ['CRITICAL', 'HIGH']:
                          count += 1
              print(count)
          except Exception:
              print(0)
          ")
          echo "CRITICAL/HIGH IaC misconfigurations: $FAILED_COUNT"
          if [ "$FAILED_COUNT" -gt "0" ]; then
            echo "IaC gate FAILED — $FAILED_COUNT CRITICAL/HIGH misconfigs in k8s/"
            exit 1
          fi
          echo "IaC gate passed."

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-results.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 7 — SBOM GENERATION (Syft)
  # ════════════════════════════════════════════════════════════
  sbom_generate:
    name: "📋 SBOM — Syft"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Install Syft
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Load Docker image from tar
        run: docker load -i juiceshop-image.tar

      - name: Generate SBOM in JSON format
        run: |
          syft docker.io/${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.version }} \
            -o json > sbom.json 2>/dev/null \
            || syft juiceshop-image.tar -o json > sbom.json
          python3 -c "
          import json
          with open('sbom.json') as f:
              d = json.load(f)
          print(f'Total packages in SBOM: {len(d.get(\"artifacts\",[]))}')
          "

      - name: Generate SBOM in SPDX format
        run: |
          syft juiceshop-image.tar -o spdx-json > sbom.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: |
            sbom.json
            sbom.spdx.json
          retention-days: 90


  # ════════════════════════════════════════════════════════════
  # JOB 8 — DAST (OWASP ZAP FULL ACTIVE SCAN)
  # Runs against the LOCAL image loaded from tar — the image has
  # still never been pushed to Docker Hub at this point.
  # ════════════════════════════════════════════════════════════
  dast_scan:
    name: "🕷️ DAST — OWASP ZAP Full Active Scan"
    runs-on: ubuntu-latest
    needs: [image_scan, iac_scan, sbom_generate]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Load and start Juice Shop for DAST scanning
        run: |
          docker load -i juiceshop-image.tar
          docker run -d \
            --name juiceshop-dast \
            -p 3000:3000 \
            $(docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep juiceshop | head -1)

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:3000 || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "App is ready — HTTP $HTTP_STATUS"
              break
            fi
            echo "Attempt $i — HTTP $HTTP_STATUS — waiting 5s..."
            sleep 5
          done

      # ── ADVANCED DAST — FULL ACTIVE SCAN ──────────────────────
      # zap-full-scan.py replaces zap-baseline.py.
      #
      # baseline = passive only. It spiders the app and inspects
      #            responses. Never sends an attack payload.
      #            Finds missing headers, cookie flags, info leaks.
      #
      # full     = passive + ACTIVE attack. Sends real SQLi, XSS,
      #            path traversal, command injection, and XXE
      #            payloads against every discovered parameter.
      #            This is what finds exploitable vulnerabilities.
      #
      # FLAGS:
      #   -j        AJAX spider — required for Juice Shop, which is
      #             an Angular SPA. The traditional spider only sees
      #             the initial HTML and misses nearly every route.
      #   -m 10     spend up to 10 minutes spidering before attacking
      #   -T 90     hard ceiling of 90 minutes for the whole scan
      #   -I        do not let ZAP's own exit code fail the step —
      #             our Python gate below decides pass/fail
      #   -z ...    raise attack strength and lower the alert
      #             threshold so lower-confidence findings surface
      #
      # RUNTIME: expect 30–90 minutes, versus ~5 for baseline.
      # Well inside the 6-hour GitHub Actions job limit.
      # ──────────────────────────────────────────────────────────
      - name: Run OWASP ZAP Full Active DAST scan
        timeout-minutes: 120
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:3000 \
            -r zap-report.html \
            -J zap-report.json \
            -j \
            -m 10 \
            -T 90 \
            -I \
            -z "-config scanner.attackStrength=HIGH \
                -config scanner.alertThreshold=LOW \
                -config spider.maxDuration=10" \
            || true

      - name: Fix ZAP report ownership
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" . 2>/dev/null || true
          ls -lh zap-report.* 2>/dev/null || echo "no ZAP reports produced"

      - name: Ensure ZAP output exists
        run: |
          if [ ! -f zap-report.json ] || [ ! -s zap-report.json ]; then
            echo '{"site":[{"@name":"http://localhost:3000","alerts":[]}]}' \
              > zap-report.json
          fi

      - name: Enforce DAST gate — fail on HIGH alerts
        run: |
          HIGH_COUNT=$(python3 -c "
          import json
          try:
              with open('zap-report.json') as f:
                  data = json.load(f)
              count = sum(
                  1 for alert in data.get('site', [{}])[0].get('alerts', [])
                  if str(alert.get('riskcode','0')) == '3'
              )
              print(count)
          except Exception:
              print(0)
          ")
          echo "ZAP HIGH risk alerts: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt "0" ]; then
            echo "DAST gate FAILED — $HIGH_COUNT HIGH risk alerts."
            echo "Image will NOT be pushed to Docker Hub."
            exit 1
          fi
          echo "DAST gate passed — image is cleared for Docker Hub push."

      - name: Stop DAST target container
        if: always()
        run: docker stop juiceshop-dast || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 9 — PUSH TO DOCKER HUB (ONLY AFTER DAST PASSES)
  #
  # The ONLY place the image leaves the pipeline. Runs only if
  # dast_scan succeeded → which required image/iac/sbom → which
  # required build ← sast + sca ← secrets.
  # A push here means EVERY gate passed on the EXACT same bytes
  # that were scanned (no rebuild between scan and publish).
  # ════════════════════════════════════════════════════════════
  push_image:
    name: "🚀 Push to Docker Hub (post-DAST)"
    runs-on: ubuntu-latest
    needs: [dast_scan, build]

    outputs:
      version: ${{ needs.build.outputs.version }}

    steps:
      - name: Download Docker Image tar artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Load Docker image from tar
        run: docker load -i juiceshop-image.tar

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push verified image to Docker Hub
        run: |
          docker push docker.io/${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.version }}
          echo "Pushed docker.io/${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.version }}"
          echo "All security gates passed before this push:"
          echo "  Secrets | SAST | SCA | Image | IaC | SBOM | DAST"


  # ════════════════════════════════════════════════════════════
  # JOB 10 — VERIFIED IMAGE DEPLOYMENT BEHIND BUNKERWEB WAF
  #
  # Deploys the gate-passed image on the self-hosted runner, but
  # NOT directly on port 80. Instead:
  #
  #   Internet ─► BunkerWeb :80/:443 ─► juiceshop-app :3000
  #                  (WAF, CRS)          (internal network only)
  #
  # KEY DIFFERENCE from a direct deployment:
  #   • BunkerWeb owns host ports 80 and 443.
  #   • juiceshop-app publishes NO host port. It is reachable
  #     ONLY through the WAF, by container name, over a private
  #     Docker network (bw-net).
  #   • Every request is inspected by ModSecurity + OWASP CRS
  #     before it ever touches the app.
  #
  # WAF STARTS IN DETECTION MODE (MODSECURITY_SEC_RULE_ENGINE:
  # DetectionOnly). CRS in blocking mode breaks an Angular SPA
  # with false positives on day one. Observe → tune → then set
  # this to "on". Same Count→Block promotion as a cloud WAF.
  #
  # PORT MAP on the runner:
  #   80/443  bunkerweb-aio   ← WAF, the only public entrypoint
  #   3000    juiceshop-app   ← internal to bw-net, NOT published
  #   8080    DefectDojo
  # ════════════════════════════════════════════════════════════
  verified_image_deployment:
    name: "🛡️ Verified Image Deployment (behind BunkerWeb WAF)"
    runs-on: [self-hosted, Linux, X64]
    needs: [push_image, build]

    env:
      APP_CONTAINER: juiceshop-app
      WAF_CONTAINER: bunkerweb-aio
      BW_NETWORK:    bw-net
      APP_INTERNAL_PORT: 3000        # Juice Shop listens here, inside bw-net
      WAF_HTTP_PORT:  80
      WAF_HTTPS_PORT: 443
      BUNKERWEB_IMAGE: bunkerity/bunkerweb-all-in-one:1.6.12
      # ── WebUI (control plane) ───────────────────────────────
      # Served THROUGH BunkerWeb on an unguessable path — NOT on
      # its own public port. Auth + secret path + HTTPS + (opt)
      # IP allowlist. Set the two secrets in the repo:
      #   BUNKERWEB_UI_USERNAME, BUNKERWEB_UI_PASSWORD
      # and optionally BUNKERWEB_UI_PATH (default below).
      UI_PATH: ${{ secrets.BUNKERWEB_UI_PATH || 'admin-7f3c9e21' }}

    steps:
      - name: Resolve image reference
        run: |
          IMAGE="docker.io/${{ env.DOCKERHUB_REPO }}:${{ needs.build.outputs.version }}"
          echo "APP_IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "Verified image to deploy behind WAF: $IMAGE"

      - name: Show what is currently running
        run: |
          echo "=== Containers on this runner ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

      - name: Pre-flight — port 80 must be free for BunkerWeb
        run: |
          # Another CONTAINER (not our WAF) holding 80?
          IN_USE=$(docker ps --filter "publish=${{ env.WAF_HTTP_PORT }}" \
            --format '{{.Names}}' | grep -v "^${{ env.WAF_CONTAINER }}$" || true)
          if [ -n "$IN_USE" ]; then
            echo "Port 80 is held by container: $IN_USE"
            echo "That is not the WAF — refusing to continue."
            exit 1
          fi

          # A HOST service (apache2 / nginx) on 80?
          if ss -ltn 2>/dev/null | grep -q ':80 '; then
            if ! docker ps --filter "name=${{ env.WAF_CONTAINER }}" -q | grep -q .; then
              echo "Port 80 is bound by a host process:"
              ss -ltnp 2>/dev/null | grep ':80 ' || true
              echo ""
              echo "Free it (Kali ships apache2):"
              echo "  sudo systemctl stop apache2 && sudo systemctl disable apache2"
              exit 1
            fi
          fi
          echo "Port 80 is available for BunkerWeb."

      - name: Ensure private WAF network exists
        run: |
          if ! docker network inspect "${{ env.BW_NETWORK }}" >/dev/null 2>&1; then
            docker network create "${{ env.BW_NETWORK }}"
            echo "Created network ${{ env.BW_NETWORK }}"
          else
            echo "Network ${{ env.BW_NETWORK }} already exists."
          fi

      - name: Download verified image tar
        uses: actions/download-artifact@v4
        with:
          name: docker-image-tar
          path: .

      - name: Load verified image
        run: docker load -i juiceshop-image.tar

      # ── APP: internal only, NO host port ──────────────────────
      - name: (Re)deploy Juice Shop on the private network
        run: |
          docker rm -f "${{ env.APP_CONTAINER }}" 2>/dev/null || true

          docker run -d \
            --name "${{ env.APP_CONTAINER }}" \
            --restart unless-stopped \
            --network "${{ env.BW_NETWORK }}" \
            --memory 1g \
            --cpus 1.0 \
            --label pipelinefortress.managed=true \
            --label pipelinefortress.version=${{ needs.build.outputs.version }} \
            --label pipelinefortress.commit=${{ github.sha }} \
            "${{ env.APP_IMAGE }}"

          echo "Juice Shop started on ${{ env.BW_NETWORK }} — no host port published."

      # ── WAF + WebUI ───────────────────────────────────────────
      # BunkerWeb owns 80/443. Two things served through it:
      #   https://<host>/                → Juice Shop (via WAF)
      #   https://<host>/<UI_PATH>/      → BunkerWeb WebUI login
      #
      # MULTISITE=yes is REQUIRED: the SERVER_NAME-prefixed vars
      # (…_USE_TEMPLATE=ui etc.) are how the UI gets reverse-proxied
      # on the secret path. SERVICE_UI=yes turns the UI on; port
      # 7000 is NOT published — the docs mark direct 7000 exposure
      # as not for production.
      #
      # Fails early if the UI credentials secrets are missing, so
      # you never boot an admin panel with blank/default creds.
      # ──────────────────────────────────────────────────────────
      - name: (Re)deploy BunkerWeb + WebUI in front of the app
        env:
          UI_USER: ${{ secrets.BUNKERWEB_UI_USERNAME }}
          UI_PASS: ${{ secrets.BUNKERWEB_UI_PASSWORD }}
        run: |
          if [ -z "$UI_USER" ] || [ -z "$UI_PASS" ]; then
            echo "::error::BUNKERWEB_UI_USERNAME / BUNKERWEB_UI_PASSWORD secrets are not set."
            echo "Add them in repo Settings → Secrets → Actions before enabling the UI."
            exit 1
          fi

          docker rm -f "${{ env.WAF_CONTAINER }}" 2>/dev/null || true

          RUNNER_IP=$(hostname -I 2>/dev/null | awk '{print $1}')
          SN="$RUNNER_IP"                    # SERVER_NAME = the box IP
          UIP="${{ env.UI_PATH }}"           # unguessable admin path

          docker run -d \
            --name "${{ env.WAF_CONTAINER }}" \
            --restart unless-stopped \
            --network "${{ env.BW_NETWORK }}" \
            -p ${{ env.WAF_HTTP_PORT }}:8080/tcp \
            -p ${{ env.WAF_HTTPS_PORT }}:8443/tcp \
            -p ${{ env.WAF_HTTPS_PORT }}:8443/udp \
            -v bw-storage:/data \
            -e SERVER_NAME="$SN" \
            -e MULTISITE="yes" \
            -e DISABLE_DEFAULT_SERVER="yes" \
            \
            -e USE_REVERSE_PROXY="yes" \
            -e REVERSE_PROXY_URL="/" \
            -e REVERSE_PROXY_HOST="http://${{ env.APP_CONTAINER }}:${{ env.APP_INTERNAL_PORT }}" \
            \
            -e SERVICE_UI="yes" \
            -e UI_WIZARD="no" \
            -e ADMIN_USERNAME="$UI_USER" \
            -e ADMIN_PASSWORD="$UI_PASS" \
            -e "${SN}_USE_TEMPLATE=ui" \
            -e "${SN}_USE_REVERSE_PROXY=yes" \
            -e "${SN}_REVERSE_PROXY_URL=/${UIP}/" \
            -e "${SN}_REVERSE_PROXY_HOST=http://127.0.0.1:7000" \
            -e "${SN}_REVERSE_PROXY_HEADERS=X-Script-Name /${UIP}" \
            -e "${SN}_REVERSE_PROXY_INTERCEPT_ERRORS=no" \
            \
            -e USE_MODSECURITY="yes" \
            -e USE_MODSECURITY_CRS="yes" \
            -e MODSECURITY_SEC_RULE_ENGINE="DetectionOnly" \
            -e ALLOWED_METHODS="GET|POST|HEAD|PUT|DELETE|OPTIONS" \
            -e X_FRAME_OPTIONS="SAMEORIGIN" \
            -e USE_GZIP="yes" \
            -e USE_LIMIT_REQ="yes" \
            -e LIMIT_REQ_URL_1="/rest/user/login" \
            -e LIMIT_REQ_RATE_1="5r/s" \
            \
            -e AUTO_LETS_ENCRYPT="no" \
            -e GENERATE_SELF_SIGNED_SSL="yes" \
            "${{ env.BUNKERWEB_IMAGE }}"

          echo "BunkerWeb + WebUI started."
          echo "  App : https://$SN/"
          echo "  UI  : https://$SN/${UIP}/"

      - name: Health check through the WAF
        run: |
          echo "Polling http://localhost:${{ env.WAF_HTTP_PORT }} (through BunkerWeb) ..."
          READY=0
          # BunkerWeb + app cold start is slower than a bare container
          for i in $(seq 1 40); do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
              "http://localhost:${{ env.WAF_HTTP_PORT }}" || echo "000")
            # 200 = through to app. 302/403 can also mean WAF is up and
            # responding (redirect to HTTPS, or CRS challenge) — treat
            # any non-000/502/504 as "WAF is alive".
            case "$CODE" in
              200) echo "Healthy through WAF — HTTP 200 after $i attempt(s)"; READY=1; break;;
              000|502|503|504) echo "  attempt $i — HTTP $CODE — upstream not ready, retry 5s"; sleep 5;;
              *)   echo "  attempt $i — HTTP $CODE — WAF responding; confirming app path"; sleep 5;;
            esac
          done

          if [ "$READY" != "1" ]; then
            echo "App did not become reachable through the WAF within ~200s."
            echo "=== BunkerWeb logs (last 40) ==="
            docker logs --tail 40 "${{ env.WAF_CONTAINER }}" 2>&1 || true
            echo "=== Juice Shop logs (last 40) ==="
            docker logs --tail 40 "${{ env.APP_CONTAINER }}" 2>&1 || true
            exit 1
          fi

      - name: Confirm the app is NOT directly exposed
        run: |
          # Juice Shop must NOT answer on 3000 from the host — only via WAF.
          DIRECT=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:${{ env.APP_INTERNAL_PORT }}" || echo "000")
          if [ "$DIRECT" = "200" ]; then
            echo "::warning::App is reachable directly on :${{ env.APP_INTERNAL_PORT }} — WAF can be bypassed. Check no stray -p publish exists."
          else
            echo "Good — app is not directly reachable on :${{ env.APP_INTERNAL_PORT }} (HTTP $DIRECT). WAF is the only entrypoint."
          fi

      - name: Housekeeping — reclaim disk on the runner
        if: always()
        run: |
          rm -f juiceshop-image.tar
          docker image prune -f || true
          echo "Disk free: $(df -h / | tail -1 | awk '{print $4}')"

      - name: Deployment summary
        run: |
          RUNNER_IP=$(hostname -I 2>/dev/null | awk '{print $1}')
          echo "==========================================================="
          echo "  VERIFIED IMAGE DEPLOYMENT — BEHIND BUNKERWEB WAF"
          echo "==========================================================="
          echo "  Flow       : client → BunkerWeb(:80/:443) → juiceshop-app(:3000)"
          echo "  Image      : ${{ env.APP_IMAGE }}"
          echo "  WAF        : ${{ env.WAF_CONTAINER }}  (ModSecurity + OWASP CRS)"
          echo "  WAF mode   : DetectionOnly  (tune, then set to 'on')"
          echo "  App access : ONLY via WAF — no host port on the app"
          echo "  App URL    : https://${RUNNER_IP}/           (self-signed)"
          echo "  WebUI URL  : https://${RUNNER_IP}/${{ env.UI_PATH }}/  (login)"
          echo "  DefectDojo : http://localhost:8080"
          echo "  Gates      : Secrets | SAST | SCA | Image | IaC | SBOM | DAST"
          echo "==========================================================="
          docker ps --filter "name=${{ env.WAF_CONTAINER }}" \
                    --filter "name=${{ env.APP_CONTAINER }}" \
            --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "Watch what CRS would block (still in DetectionOnly):"
          echo "  docker logs -f ${{ env.WAF_CONTAINER }} | grep -i modsecurity"
          echo "When tuned, promote to blocking:"
          echo "  re-run with MODSECURITY_SEC_RULE_ENGINE=on"


  # ════════════════════════════════════════════════════════════
  # JOB 11 — CONSOLIDATE FINDINGS + DEFECTDOJO IMPORT
  # Runs on self-hosted runner (Kali) next to DefectDojo.
  # ════════════════════════════════════════════════════════════
  consolidate_and_dojo_import:
    name: "🛡️ Consolidate Findings + DefectDojo Import"
    # Runner labels: self-hosted · Linux · X64
    # Pinning all three prevents this job landing on a future
    # runner with different OS/arch (e.g. an ARM box).
    runs-on: [self-hosted, Linux, X64]
    needs:
      - secrets_scan
      - sast_scan
      - sca_scan
      - image_scan
      - iac_scan
      - sbom_generate
      - dast_scan
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports
          pattern: "*-report*"
          merge-multiple: true

      - name: List downloaded reports
        run: |
          echo "=== Downloaded report files ==="
          ls -lah reports/ || echo "reports/ is empty"

      - name: Verify merge_findings.py exists
        run: |
          if [ ! -f scripts/merge_findings.py ]; then
            echo "ERROR: scripts/merge_findings.py not found in repo"
            echo "Add it to your repo: scripts/merge_findings.py"
            exit 1
          fi
          echo "merge_findings.py found"

      - name: Merge all findings into a single JSON
        run: |
          python3 scripts/merge_findings.py \
            --outdir reports \
            --output all-findings.json \
            --verbose
          echo ""
          echo "=== all-findings.json preview ==="
          python3 -m json.tool all-findings.json | head -60

      - name: Upload consolidated findings JSON
        uses: actions/upload-artifact@v4
        with:
          name: all-findings-consolidated
          path: all-findings.json
          retention-days: 90

      - name: Import findings into DefectDojo
        env:
          DEFECTDOJO_URL:     ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
        run: |
          HTTP_CODE=$(curl -sS -X POST \
            "${DEFECTDOJO_URL}/api/v2/import-scan/" \
            -H "Authorization: Token ${DEFECTDOJO_API_KEY}" \
            -F "scan_type=Generic Findings Import" \
            -F "file=@all-findings.json" \
            -F "product_type_name=Personal Projects" \
            -F "product_name=PipelineFortress" \
            -F "engagement_name=CI Pipeline Runs" \
            -F "auto_create_context=True" \
            -F "active=true" \
            -F "verified=false" \
            -F "minimum_severity=Info" \
            -F "close_old_findings=false" \
            -F "scan_date=$(date +%F)" \
            -F "tags=pipelinefortress,ci,automated" \
            -o dojo-import-response.json \
            -w "%{http_code}")

          echo "HTTP response code: $HTTP_CODE"
          echo "=== DefectDojo response ==="
          python3 -m json.tool dojo-import-response.json || cat dojo-import-response.json

          if [[ "$HTTP_CODE" != "201" && "$HTTP_CODE" != "200" ]]; then
            echo "DefectDojo import FAILED — HTTP $HTTP_CODE"
            exit 1
          fi
          echo "DefectDojo import SUCCESS — HTTP $HTTP_CODE"

      - name: Upload DefectDojo import response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dojo-import-response
          path: dojo-import-response.json
          retention-days: 30


  # ════════════════════════════════════════════════════════════
  # JOB 12 — LLM TRIAGE (NVIDIA NIM)
  # ════════════════════════════════════════════════════════════
  llm_triage:
    name: "🤖 LLM Triage — NVIDIA NIM"
    runs-on: ubuntu-latest
    needs: dast_scan
    if: always()   # triage is MOST useful when a gate failed, so run regardless

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all scanner reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-report*"
          merge-multiple: true

      - name: Install dependencies
        run: pip install openai --break-system-packages

      - name: Merge scanner outputs into one JSON
        run: python3 triage/merge_findings.py

      - name: Redact before anything leaves the runner
        run: python3 triage/redact.py

      - name: Verify redaction (fail build if a secret survived)
        run: python3 triage/verify_redaction.py

      - name: Run LLM triage via NVIDIA NIM
        env:
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
        run: python3 triage/triage.py

      - name: Upload triage evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-triage-output
          path: |
            consolidated_findings.json
            redacted_findings.json
            prompt_sent_to_llm.txt
            triage_report.md
            triage_report.json
            llm_raw.txt
          retention-days: 90


  # ════════════════════════════════════════════════════════════
  # JOB 13 — AUTO-FIX PR (Scenario A: fully automated)
  # ════════════════════════════════════════════════════════════
  auto_fix_pr:
    name: "🔧 Auto-Fix PR — human must approve"
    runs-on: ubuntu-latest
    needs: llm_triage

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download triage report
        uses: actions/download-artifact@v4
        with:
          name: llm-triage-output

      - name: Generate remediation files from top-3 findings
        run: python3 triage/make_fix_files.py

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: fix/llm-triage/auto-remediation
          title: "security: LLM-drafted fixes for top 3 findings (needs human review)"
          body-path: triage_report.md
          commit-message: "security: add LLM-drafted remediation proposals"
          labels: security, llm-generated
          delete-branch: true
          add-paths: |
            security/remediation/**
